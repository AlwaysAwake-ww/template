server:
  port: 8080
  servlet:
    context-path: /

spring:
  # todo 개발 DB 연결
  datasource:
    url: jdbc:h2:mem:test
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true # show sql in console
    properties:
      hibernate:
        format_sql: ture
    open-in-view: false # 영속성 컨텍스트 생존 범위를 트랜잭션 범위로 한정

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB


logging:
  level:
    org.hibernate.type: trace # binding value

